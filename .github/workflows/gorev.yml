# GOREV veri motoru v1.0 (2026-07-10)
# Hafta ici her sabah 06:00 TR (03:00 UTC) calisir, data/jobs.json gunceller.
name: gorev-veri-motoru

on:
  schedule:
    - cron: "0 3 * * 1-5"   # Pzt-Cum 06:00 TR
  workflow_dispatch: {}       # Elle tetikleme butonu (Actions sekmesinde)

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ilanlari cek
        env:
          JSEARCH_KEY: ${{ secrets.JSEARCH_KEY }}
        run: python fetch_jobs.py

      - name: Degisiklikleri commit et
        run: |
          git config user.name "gorev-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "veri: $(date -u +%F) ilan guncellemesi"
          git push

      # Opsiyonel telefon bildirimi (ntfy.sh)
      # Aktive etmek icin: repo Settings > Secrets > Actions'a
      # NTFY_TOPIC adinda bir secret ekle (ornek deger: burcu-gorev-x7k2)
      # Telefona ntfy uygulamasini kur, ayni topic'e abone ol.
      - name: Sabah bildirimi (ntfy)
        if: ${{ vars.NTFY_TOPIC != '' }}
        run: |
          COUNT=$(python -c "import json; print(json.load(open('data/jobs.json'))['job_count'])")
          DAY=$(TZ=Europe/Istanbul date +%u)
          if [ "$DAY" = "2" ]; then
            MSG="Sali: en verimli basvuru gunu. $COUNT ilan hazir, 06:00-10:00 penceresi acik. Gorev 1 seni bekliyor."
          else
            MSG="Gunaydin. $COUNT ilan tarandi, Gorev 1 hazir."
          fi
          curl -s -H "Title: GOREV" -d "$MSG" "https://ntfy.sh/${{ vars.NTFY_TOPIC }}" || true
