<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GÖREV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============ GÖREV v1.4 (2026-07-10) ============ */
:root{
  --night:#131A26; --dusk:#1B2635; --predawn:#26344A;
  --dawn-sky:#F3E9DC; --amber:#E3A44A; --amber-soft:#EFC98B;
  --bosphorus:#38677F; --ink:#E9E4DA; --ink-dim:#9BA3B0; --ink-dark:#22262E;
  --card:#1E293A; --card-line:#2E3B50;
  --danger:#C05B4D; --success:#6C8F6E; --warn:#B98A3C;
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'IBM Plex Sans',sans-serif; color:var(--ink);
  min-height:100vh; transition:background 1.4s ease;
  background:linear-gradient(180deg,var(--night) 0%,var(--dusk) 100%);
}
body.sky-1{background:linear-gradient(180deg,var(--dusk) 0%,var(--predawn) 100%)}
body.sky-2{background:linear-gradient(180deg,var(--predawn) 0%,#3A4A66 100%)}
body.sky-3{background:linear-gradient(180deg,#3A4A66 0%,#7A6A5C 60%,#B98A5C 100%)}
body.sky-4{background:linear-gradient(180deg,#8A7B8F 0%,var(--amber-soft) 55%,var(--dawn-sky) 100%)}
body.sky-4, body.sky-4 .quiet, body.sky-4 h1{color:var(--ink-dark)}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}

.wrap{max-width:640px;margin:0 auto;padding:28px 18px 90px}
header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.brand{font-family:'Sora',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:.24em}
.brand small{display:block;letter-spacing:.06em;font-weight:400;font-size:.68rem;color:var(--ink-dim);margin-top:2px}
.streak{font-family:'IBM Plex Mono',monospace;font-size:.82rem;color:var(--amber)}
.daygoal{font-family:'IBM Plex Mono',monospace;font-size:.72rem;color:var(--ink-dim);margin-bottom:8px}
.daygoal b{color:var(--amber)}

.horizon{position:relative;height:26px;margin:12px 0 26px}
.horizon .line{position:absolute;top:13px;left:0;right:0;height:2px;background:var(--card-line);border-radius:2px}
.horizon .lit{position:absolute;top:13px;left:0;height:2px;background:linear-gradient(90deg,var(--bosphorus),var(--amber));border-radius:2px;transition:width 1.2s ease}
.horizon .sun{position:absolute;top:5px;width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#FFE9C2,var(--amber));box-shadow:0 0 14px rgba(227,164,74,.55);transition:left 1.2s ease;transform:translateX(-9px)}
.horizon .marks{position:absolute;top:22px;left:0;right:0;display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:.58rem;color:var(--ink-dim)}

h1{font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:600;line-height:1.3;margin-bottom:8px}
.quiet{color:var(--ink-dim);font-size:.9rem;line-height:1.5}
.mono{font-family:'IBM Plex Mono',monospace}

.card{background:var(--card);border:1px solid var(--card-line);border-radius:var(--r);padding:20px;margin-top:16px}
body.sky-3 .card, body.sky-4 .card{background:rgba(255,255,255,.82);border-color:rgba(0,0,0,.08);color:var(--ink-dark)}
body.sky-3 .card .quiet, body.sky-4 .card .quiet{color:#5A5F6A}
body.sky-3, body.sky-3 h1{color:var(--ink)}

.btn{display:inline-block;border:none;border-radius:10px;padding:13px 20px;font-family:'Sora',sans-serif;font-weight:600;font-size:.95rem;cursor:pointer;transition:transform .12s ease,opacity .12s}
.btn:active{transform:scale(.97)}
.btn:focus-visible{outline:3px solid var(--amber);outline-offset:2px}
.btn-primary{background:var(--amber);color:#241A0C;width:100%;margin-top:14px}
.btn-ghost{background:transparent;color:var(--ink-dim);border:1px solid var(--card-line);font-weight:400;font-size:.85rem;padding:9px 14px}
body.sky-3 .btn-ghost,body.sky-4 .btn-ghost{color:#5A5F6A;border-color:rgba(0,0,0,.15)}
.btn-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.btn-row .btn{flex:1;padding:11px 8px;font-size:.85rem}
.b-queue{background:var(--bosphorus);color:#fff}
.b-pass{background:transparent;border:1px solid var(--card-line);color:var(--ink-dim)}
.b-warm{background:#5C4A70;color:#fff}
.back{background:transparent;color:var(--ink-dim);border:1px solid var(--card-line);border-radius:8px;font-size:.78rem;padding:7px 12px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;margin-bottom:12px}
body.sky-3 .back,body.sky-4 .back{color:#5A5F6A;border-color:rgba(0,0,0,.15)}

.badge{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:.66rem;padding:3px 8px;border-radius:20px;margin:0 6px 6px 0;letter-spacing:.03em}
.bg-green{background:rgba(108,143,110,.18);color:#9CC49E;border:1px solid rgba(108,143,110,.4)}
.bg-red{background:rgba(192,91,77,.16);color:#D98B7F;border:1px solid rgba(192,91,77,.4)}
.bg-warn{background:rgba(185,138,60,.16);color:var(--amber-soft);border:1px solid rgba(185,138,60,.4)}
.bg-info{background:rgba(56,103,127,.2);color:#8FBBD1;border:1px solid rgba(56,103,127,.45)}

.job-title{font-family:'Sora',sans-serif;font-weight:600;font-size:1.08rem;margin-bottom:2px}
.job-meta{font-size:.84rem;color:var(--ink-dim);margin-bottom:10px}
.fit-bar{height:5px;background:var(--card-line);border-radius:3px;margin:10px 0 4px;overflow:hidden}
.fit-bar div{height:100%;background:linear-gradient(90deg,var(--bosphorus),var(--amber));border-radius:3px}
.fit-label{font-family:'IBM Plex Mono',monospace;font-size:.68rem;color:var(--ink-dim)}

.checklist label{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--card-line);cursor:pointer;font-size:.93rem;line-height:1.45}
.checklist label:last-of-type{border-bottom:none}
.checklist input{width:19px;height:19px;accent-color:var(--amber);flex-shrink:0;margin-top:1px}

input[type=text],input[type=url],textarea,select{
  width:100%;background:#141C2A;border:1px solid var(--card-line);color:var(--ink);
  border-radius:9px;padding:10px 12px;font-family:'IBM Plex Sans',sans-serif;font-size:.9rem;margin-top:8px}
body.sky-3 input,body.sky-3 textarea,body.sky-3 select,
body.sky-4 input,body.sky-4 textarea,body.sky-4 select{background:#fff;color:var(--ink-dark);border-color:rgba(0,0,0,.15)}
textarea{min-height:80px;resize:vertical}
input:focus,textarea:focus,select:focus{outline:2px solid var(--amber)}
input[type=number]{width:80px;background:#141C2A;border:1px solid var(--card-line);color:var(--ink);border-radius:9px;padding:8px 10px;margin-top:6px}
body.sky-3 input[type=number],body.sky-4 input[type=number]{background:#fff;color:var(--ink-dark)}

.scratch{position:relative;height:150px;border-radius:var(--r);overflow:hidden;margin-top:16px;cursor:pointer;user-select:none}
.scratch .under{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#F7EEDB,#EFC98B);color:#3A2C12;text-align:center;padding:14px}
.scratch .under .prize{font-family:'Sora',sans-serif;font-weight:700;font-size:1.25rem}
.scratch .cover{position:absolute;inset:0;background:repeating-linear-gradient(45deg,#2A3448,#2A3448 12px,#232C3E 12px,#232C3E 24px);display:flex;align-items:center;justify-content:center;font-family:'Sora',sans-serif;letter-spacing:.15em;font-size:.85rem;color:var(--ink-dim);transition:opacity .5s,transform .5s}
.scratch.open .cover{opacity:0;transform:scale(1.06);pointer-events:none}

nav{position:fixed;bottom:0;left:0;right:0;background:rgba(15,20,30,.92);backdrop-filter:blur(8px);border-top:1px solid var(--card-line);display:flex;justify-content:center;gap:0;padding:6px 2px;z-index:50;overflow-x:auto}
nav button{background:none;border:none;color:var(--ink-dim);font-family:'IBM Plex Sans',sans-serif;font-size:.7rem;padding:8px 8px;cursor:pointer;border-radius:8px;white-space:nowrap}
nav button.on{color:var(--amber);background:rgba(227,164,74,.1)}
nav button:focus-visible{outline:2px solid var(--amber)}

.list-item{display:flex;justify-content:space-between;gap:10px;align-items:center;padding:12px 0;border-bottom:1px solid var(--card-line)}
.list-item:last-child{border-bottom:none}
.list-item .t{font-weight:500;font-size:.92rem}
.list-item .s{font-size:.78rem;color:var(--ink-dim)}
.mini{font-size:.74rem;padding:6px 10px;border-radius:7px;border:1px solid var(--card-line);background:transparent;color:var(--ink-dim);cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.mini.hot{border-color:var(--amber);color:var(--amber)}
.mini.bad{border-color:var(--danger);color:#D98B7F}
.hidden{display:none!important}
.center{text-align:center}
.kpi{display:flex;gap:6px;margin-top:10px}
.kpi span{flex:1;height:8px;border-radius:4px;background:var(--card-line)}
.kpi span.full{background:var(--success)}
.banner{border:1px solid var(--warn);background:rgba(185,138,60,.1);border-radius:10px;padding:12px 14px;font-size:.85rem;margin-top:14px;color:var(--amber-soft)}
.section-title{font-family:'Sora',sans-serif;font-size:1.1rem;font-weight:600;margin:26px 0 4px}
.todo-item{display:flex;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--card-line)}
.todo-item:last-child{border-bottom:none}
.todo-item input[type=checkbox]{width:19px;height:19px;accent-color:var(--success);flex-shrink:0}
.todo-item .txt{flex:1;font-size:.92rem}
.todo-item .txt.done{text-decoration:line-through;color:var(--ink-dim)}
footer{margin-top:40px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:.64rem;color:var(--ink-dim)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">GÖREV<small>ready, steady, go!</small></div>
    <div class="streak mono" id="streakBox">seri 0</div>
  </header>
  <div class="daygoal" id="dayGoal"></div>

  <div class="horizon" aria-hidden="true">
    <div class="line"></div>
    <div class="lit" id="hLit" style="width:0%"></div>
    <div class="sun" id="hSun" style="left:0%"></div>
    <div class="marks"><span>eleme</span><span>başvuru</span><span>mesaj</span><span>tarama</span></div>
  </div>

  <main id="app" aria-live="polite"></main>

  <footer>GÖREV v1.4 · 2026-07-10 · veri: <span id="dataAge">-</span></footer>
</div>

<nav aria-label="Bölümler">
  <button data-tab="focus" class="on">Bugün</button>
  <button data-tab="queue">Kuyruk</button>
  <button data-tab="tracker">Takip</button>
  <button data-tab="notes">Notlar</button>
  <button data-tab="cv">CV'ler</button>
  <button data-tab="blacklist">Karaliste</button>
  <button data-tab="settings">Ayarlar</button>
</nav>

<script>
/* ================= GÖREV v1.4 ================= */
"use strict";

/* ---------- sabitler ---------- */
const LANES = {
  A:{name:"BD & Partnerships", cv:"CV1_BD", note:"Referanslı başvuru öncelikli", color:"#5C7FB8"},
  B:{name:"KAM / Commercial",  cv:"CV2_KAM", note:"Birincil şerit", color:"#6C8F6E"},
  C:{name:"Insights / Client Service", cv:"CV4_Insights", note:"İkincil aktif şerit", color:"#B98A3C"},
  D:{name:"Kurumsal (UN/EBRD)",cv:"CV3_Master", note:"Yavaş süreç, yüksek uyum", color:"#8A6FA8"},
  E:{name:"Commercial Projects",cv:"CV5_Commercial_Project", note:"Fırsatçı şerit", color:"#38677F"}
};
/* CV uyum bilgisi: doğrulanmış coverage tahminleri */
const CV_FIT = {
  CV1_BD:[["BD&P Manager","%88"],["Merchant Partnerships","%90"],["Strategic Partnerships","%85"],["Channel Partnerships","%80"]],
  CV2_KAM:[["KAM / Enterprise AM","%65-70"],["CSM (SaaS)","%60-65"],["Partner Success","%65"]],
  CV3_Master:[["Kurumsal / network paylaşımı","genel"],["UN/EBRD tipi roller","yüksek uyum, düşük hacim"]],
  CV4_Insights:[["Client Service / Development","%70"],["Insights Manager","%65"]],
  CV5_Commercial_Project:[["Commercial Project Manager","%70"],["Launch / Implementation","%65"],["Partner Program Manager","%65"]]
};
/* LinkedIn şerit rotasyonu (sadece tarama görevi için) */
const LANE_OF_DAY = {1:"C",2:"B",3:"E",4:"B",5:"C",6:"B",7:"B"};
const LI_BASE = "https://www.linkedin.com/jobs/search/?f_TPR=r86400&location=Istanbul%2C%20Turkey&keywords=";
const LI_QUERIES = {
  A:'"Business Development Manager" OR "Partnerships Manager"',
  B:'"Key Account Manager" OR "Customer Success Manager" OR "Enterprise Account Manager"',
  C:'"Insights Manager" OR "Client Service" OR "Client Development"',
  E:'"Launch Manager" OR "Implementation Manager" OR "Commercial Project"'
};
const DEFAULT_REWARDS = [
  "Dondurma. Bugün hak edildi.",
  "Jelibon paketi açılıyor.",
  "1 saat tamamen serbest, suçluluk yok.",
  "Kahveni dışarıda iç, telefonsuz.",
  "Boş çıktı. Yarın şansına.",
  "Boş çıktı. Seri yine de senin.",
  "BÜYÜK ÖDÜL: bu akşam kendine güzel bir yemek."
];

/* ---------- durum ---------- */
const KEY = "gorev_state_v1";
let S = load();
function load(){
  let s = null;
  try{ s = JSON.parse(localStorage.getItem(KEY)); }catch(e){}
  const base = {
    streak:0, lastClosed:null, freezeWeek:null,
    day:{date:null, step:0, apps:0, msgs:0},
    decided:{}, queue:[], warm:[],
    tracker:[], warmLog:[], todos:[],
    pendingBlack:[], black:["Trendyol","Insider"],
    rewards:DEFAULT_REWARDS.slice(), rewardLog:[],
    goals:{apps:2, msgs:1}
  };
  if(!s) return base;
  /* v1.0 -> v1.1 geçişi: eksik alanları tamamla */
  for(const k in base){ if(s[k]===undefined) s[k]=base[k]; }
  if(s.day.apps===undefined) s.day.apps=0;
  if(s.day.msgs===undefined) s.day.msgs=0;
  return s;
}
function save(){ localStorage.setItem(KEY, JSON.stringify(S)); }

/* ---------- tarih (TR saati) ---------- */
function trDate(){ return new Date().toLocaleDateString("en-CA",{timeZone:"Europe/Istanbul"}); }
function trDow(){
  const w=new Date().toLocaleDateString("en-US",{timeZone:"Europe/Istanbul",weekday:"short"});
  return {Mon:1,Tue:2,Wed:3,Thu:4,Fri:5,Sat:6,Sun:7}[w];
}
function trDayName(dateStr){
  const d = dateStr ? new Date(dateStr+"T12:00:00Z") : null;
  const names=["Paz","Pzt","Sal","Çar","Per","Cum","Cmt"];
  return d ? names[d.getUTCDay()] : "";
}
function weekId(){
  const d=new Date(trDate()+"T12:00:00Z"); const j=new Date(Date.UTC(d.getUTCFullYear(),0,1));
  return d.getUTCFullYear()+"-"+Math.ceil((((d-j)/864e5)+j.getUTCDay()+1)/7);
}
function daysAgo(iso){ if(!iso) return null; const t=Date.parse(iso); if(isNaN(t)) return null; return Math.floor((Date.now()-t)/864e5); }
function fmtPosted(iso){
  const a = daysAgo(iso);
  if(a===null) return "tarih yok";
  const d = new Date(iso);
  const dd = String(d.getDate()).padStart(2,"0")+"."+String(d.getMonth()+1).padStart(2,"0")+"."+d.getFullYear();
  if(a===0) return "bugün · "+dd;
  if(a===1) return "dün · "+dd;
  return a+" gün önce · "+dd;
}

/* ---------- veri ---------- */
let DATA = {jobs:[], fetched_at:null, errors:[], sources:{}};
async function loadJobs(){
  try{
    const r = await fetch("data/jobs.json?t="+Date.now());
    DATA = await r.json();
    if(!DATA.sources) DATA.sources={};
  }catch(e){ DATA = {jobs:[],fetched_at:null,errors:["jobs.json okunamadı"],sources:{}}; }
  const age = daysAgo(DATA.fetched_at);
  document.getElementById("dataAge").textContent =
    DATA.fetched_at ? (age===0?"bugün":age+" gün önce") : "yok";
}
function triageList(){
  const bl = S.black.map(b=>b.toLowerCase());
  return (DATA.jobs||[])
    .filter(j=>!S.decided[j.id])
    .filter(j=>!bl.some(b=>(j.company||"").toLowerCase().includes(b)))
    .sort((a,b)=>(b.prio||0)-(a.prio||0) || (isFresh(b)?1:0)-(isFresh(a)?1:0) || (b.fit||0)-(a.fit||0))
    .slice(0,10);
}
function isFresh(j){ const a=daysAgo(j.posted_at); return a!==null && a<=2; }
function isBarbell(j){ const a=daysAgo(j.posted_at); return a!==null && a>=30; }

/* ---------- gün yönetimi ---------- */
function ensureDay(){
  const today = trDate();
  if(S.day.date !== today){ S.day = {date:today, step:0, apps:0, msgs:0}; save(); }
}
function weekWarmCount(){
  const wk = weekId();
  return S.warmLog.filter(w=>w.week===wk).length;
}
function goalsMet(){ return S.day.apps>=S.goals.apps && S.day.msgs>=S.goals.msgs; }

/* ---------- görsel ---------- */
function paintSky(){
  const stage = Math.min(4, Math.round(S.day.step/5*4));
  document.body.className = S.day.step>0 ? "sky-"+stage : "";
  const pct = Math.min(S.day.step,5)/5*100;
  document.getElementById("hLit").style.width = pct+"%";
  document.getElementById("hSun").style.left = pct+"%";
  document.getElementById("streakBox").textContent = "seri "+S.streak+(S.streak>=3?" ●":"");
  document.getElementById("dayGoal").innerHTML =
    `bugünün hedefi: <b>${S.day.apps}/${S.goals.apps}</b> başvuru · <b>${S.day.msgs}/${S.goals.msgs}</b> mesaj · hafta: ${weekWarmCount()}/5 sıcak temas`;
}

/* ---------- yardımcı html ---------- */
const app = document.getElementById("app");
function esc(s){ return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function backBtn(){ return `<button class="back" onclick="goBack()">← Geri</button>`; }
function goBack(){ if(S.day.step>0){ S.day.step--; save(); render(); } }
function badges(j){
  let h="";
  if(isFresh(j)) h+='<span class="badge bg-green">taze 24-48s</span>';
  if(isBarbell(j)) h+='<span class="badge bg-info">barbell 30g+</span>';
  (j.flags?.green||[]).slice(0,3).forEach(f=>h+='<span class="badge bg-green">'+esc(f)+'</span>');
  (j.flags?.toxic||[]).forEach(f=>h+='<span class="badge bg-warn">toksik: '+esc(f)+'</span>');
  (j.flags?.red||[]).forEach(f=>h+='<span class="badge bg-red">kırmızı çizgi: '+esc(f)+'</span>');
  return h;
}
function jobCard(j, buttons){
  return `<div class="card">
    <div>${badges(j)}</div>
    <div class="job-title">${esc(j.title)}</div>
    <div class="job-meta">${esc(j.company)} · ${esc(j.location)} · <span class="mono">${esc(j.source||"")}</span></div>
    <div class="job-meta mono" style="font-size:.72rem;margin-top:-6px">ilan: ${fmtPosted(j.posted_at)}</div>
    <div class="fit-bar"><div style="width:${j.fit||0}%"></div></div>
    <div class="fit-label">Şerit ${j.lane} · ${LANES[j.lane]?.cv||""} · uyum ~%${j.fit||0}</div>
    ${j.url?`<a href="${esc(j.url)}" target="_blank" rel="noopener" class="quiet" style="font-size:.8rem">ilanı aç ↗</a>`:""}
    ${buttons||""}
  </div>`;
}

/* ================= EKRANLAR ================= */
let TAB = "focus";

function render(){
  ensureDay(); paintSky();
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.tab===TAB));
  if(TAB==="focus") renderFocus();
  else if(TAB==="queue") renderQueue();
  else if(TAB==="tracker") renderTracker();
  else if(TAB==="notes") renderNotes();
  else if(TAB==="cv") renderCV();
  else if(TAB==="blacklist") renderBlack();
  else renderSettings();
}

/* ---------- FOCUS MODE: 5 adım ---------- */
/* 0=başla, 1=eleme, 2=başvuru, 3=mesaj, 4=linkedin, 5=kapanış */
function renderFocus(){
  const dow = trDow();
  if(dow>=6){
    app.innerHTML = `<h1>Bugün kapalı.</h1>
      <p class="quiet">Hafta sonu serini bozmaz. Dinlen, fotoğraf çek.
      İlla bir şey yapmak istersen kuyruk orada ama zorunlu değil.</p>`;
    return;
  }
  if(S.day.step>=5){ renderClosed(); return; }

  const stale = daysAgo(DATA.fetched_at);
  const staleBanner = (stale===null||stale>2)
    ? `<div class="banner">Veri güncel değil. Eleme link moduna geçer: LinkedIn taramasından elle ekle.</div>` : "";

  if(S.day.step===0){
    const tue = dow===2 ? " Bugün Salı: haftanın en verimli başvuru günü, 06:00-10:00 penceresi." : "";
    app.innerHTML = `<h1>Günün hedefi: ${S.goals.apps} başvuru + ${S.goals.msgs} mesaj.</h1>
      <p class="quiet">5 adım. Sıra sende değil, sistemde.${tue}</p>
      ${staleBanner}
      <button class="btn btn-primary" onclick="stepTo(1)">Güne başla</button>`;
    return;
  }
  if(S.day.step===1){ renderTriage(staleBanner); return; }

function decide(id, what){
  S.decided[id]=what;
  const j=(DATA.jobs||[]).find(x=>x.id===id);

  save();
  if(triageList().length===0) S.day.step=2, save();
  render();
}

function manualAdd(stay){

/* Adım 5: kapanış + kazı-kazan */
function closeStreak(){
  const today=trDate();
  if(S.lastClosed===today) return;
  const last=S.lastClosed?new Date(S.lastClosed):null;
  let gap = last ? Math.round((new Date(today)-last)/864e5) : null;
  const bridged = gap!==null && (gap===1 || (gap<=3 && trDow()===1));
  if(gap===null){ S.streak=1; }
  else if(bridged){ S.streak++; }
  else if(gap===2 && S.freezeWeek!==weekId()){ S.streak++; S.freezeWeek=weekId(); }
  else { S.streak=1; }
  S.lastClosed=today;
}
function renderClosed(){
  closeStreak(); save(); paintSky();
  const met = goalsMet();
  const already = S.rewardLog.some(r=>r.date===trDate());
  app.innerHTML = `<h1>Gün kapandı.</h1>
    <p class="quiet">Seri: <b class="mono">${S.streak}</b> · Bugün: ${S.day.apps} başvuru, ${S.day.msgs} mesaj · Kuyruk: ${S.queue.length} ilan</p>
    ${met
      ? (already
        ? `<div class="card center"><p class="quiet">Bugünün kartı kazındı: <b>${esc((S.rewardLog.find(r=>r.date===trDate())||{}).prize||"")}</b></p></div>`

    <p class="quiet center" style="margin-top:16px;font-size:.8rem">Yarın sabah her şey yine hazır. Şimdi kapat.</p>`;
}
function scratchOpen(){
  const el=document.getElementById("scratch");
  if(!el||el.classList.contains("open")) return;

}
function saveGoals(){
  S.goals.apps=Math.max(1,parseInt(document.getElementById("gApps").value)||2);
  S.goals.msgs=Math.max(0,parseInt(document.getElementById("gMsgs").value)||1);
  save(); alert("Hedefler güncellendi: "+S.goals.apps+" başvuru + "+S.goals.msgs+" mesaj."); render();
}
function saveRewards(){
  S.rewards=document.getElementById("rewardsBox").value.split("\n").map(s=>s.trim()).filter(Boolean);
  save(); alert("Havuz güncellendi.");
}
function exportState(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="gorev_yedek_"+trDate()+".json"; a.click();
}
function resetDay(){ if(confirm("Bugünün adımları ve sayaçları sıfırlansın mı? Seri etkilenmez.")){ S.day={date:trDate(),step:0,apps:0,msgs:0}; save(); render(); } }

/* ---------- başlat ---------- */
document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>{TAB=b.dataset.tab;render();}));
loadJobs().then(render);
</script>
</body>
</html>
